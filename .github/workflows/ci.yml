name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: nostos_test
          POSTGRES_USER: nostos
          POSTGRES_PASSWORD: nostos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nostos -d nostos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_TEST_DATABASE_URL: postgresql://nostos:nostos@localhost:5432/nostos_test?sslmode=disable
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Go formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Frontend lint
        run: pnpm --dir web lint

      - name: Frontend type check
        run: pnpm --dir web check

      - name: Frontend tests
        run: pnpm --dir web test

      - name: Production build
        run: |
          pnpm --dir web build
          go build ./cmd/app

      - name: Docker build
        run: docker build -t nostos:ci .
