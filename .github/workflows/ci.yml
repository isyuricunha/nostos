name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nostos_test
          POSTGRES_USER: nostos
          POSTGRES_PASSWORD: nostos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nostos -d nostos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_TEST_DATABASE_URL: postgresql://nostos:nostos@localhost:5432/nostos_test?sslmode=disable
      APP_VERSION: 0.1.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Go formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Repository identity guard
        run: |
          if rg -n 'github\.com/yuricunha' . -g '!web/node_modules' -g '!node_modules' -g '!data'; then
            echo "obsolete GitHub module path found"
            exit 1
          fi

      - name: Module tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Whitespace check
        run: git diff --check

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

      - name: Go race tests
        run: go test -race ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Frontend lint
        run: pnpm --dir web lint

      - name: Frontend type check
        run: pnpm --dir web check

      - name: Frontend tests
        run: pnpm --dir web test

      - name: Install Playwright browser
        run: pnpm --dir web exec playwright install --with-deps chromium

      - name: Browser E2E tests
        run: pnpm --dir web test:e2e

      - name: Production build
        run: |
          pnpm --dir web build
          go build -ldflags "-X main.version=${APP_VERSION} -X main.buildCommit=${GITHUB_SHA} -X main.buildTimestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" ./cmd/app

      - name: Docker build
        run: |
          docker build \
            --build-arg VERSION=${APP_VERSION} \
            --build-arg BUILD_COMMIT=${GITHUB_SHA} \
            --build-arg BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t nostos:ci .
